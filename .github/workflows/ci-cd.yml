name: CI and deploy

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: automatic-monitoring-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend lint dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run backend lint
        run: ruff check backend

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/monitoring-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/monitoring-ui
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend/monitoring-ui
        run: npm run lint

      - name: Build frontend
        working-directory: frontend/monitoring-ui
        run: npm run build -- --configuration production

  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare test environment
        run: cp config/env.example .env

      - name: Run backend tests
        run: docker compose -f docker-compose.yml --project-name transport run --rm backend pytest

  deploy:
    if: github.ref == 'refs/heads/main' && vars.ENABLE_SERVER_DEPLOY == 'true'
    needs:
      - lint
      - backend-tests
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: oem@chipkineev.ru
      DEPLOY_PATH: /home/oem/automatic-monitoring
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          test -n "$DEPLOY_SSH_PRIVATE_KEY"
          test -n "$DEPLOY_KNOWN_HOSTS"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Build deploy images
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: docker compose -p automatic-monitoring -f docker-compose.deploy.yml build backend frontend celery_worker celery_beat

      - name: Pull main on server
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_TARGET" \
            "git -C '$DEPLOY_PATH' pull --ff-only origin main"

      - name: Transfer deploy images
        run: |
          docker save \
            automatic-monitoring-backend:latest \
            automatic-monitoring-frontend:latest \
            automatic-monitoring-celery_worker:latest \
            automatic-monitoring-celery_beat:latest \
            | gzip \
            | ssh -i ~/.ssh/deploy_key "$DEPLOY_TARGET" 'gunzip | docker load'

      - name: Start services
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_TARGET" \
            "docker compose -f '$DEPLOY_PATH/docker-compose.deploy.yml' up -d --no-build backend frontend celery_worker celery_beat &&
             docker compose -f '$DEPLOY_PATH/docker-compose.deploy.yml' ps"
