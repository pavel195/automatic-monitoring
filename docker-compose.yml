services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    networks:
      - app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    restart: unless-stopped
    networks:
      - app
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTIC_USERNAME=elastic
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - /app/backend/__pycache__
    depends_on:
      - postgres
      - redis
      - elasticsearch
    networks:
      - app

  celery_worker:
    volumes:
      - ./backend:/app/backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A monolith worker -l info
    env_file: .env
    depends_on:
      - backend
      - redis
    networks:
      - app

  celery_beat:
    volumes:
      - ./backend:/app/backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A monolith beat -l info
    env_file: .env
    depends_on:
      - backend
      - redis
    networks:
      - app

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    networks:
      - app
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    env_file: .env
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/monitoring-ui:/app/frontend
      - /app/frontend/node_modules
    depends_on:
      - backend
    networks:
      - app

volumes:
  pgdata:
  ollama_data:

networks:
  app:
    driver: bridge
