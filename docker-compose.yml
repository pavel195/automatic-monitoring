version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    networks:
      - app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.9
    restart: unless-stopped
    networks:
      - app
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  kafka:
    image: bitnami/kafka:3.7
    restart: unless-stopped
    networks:
      - app
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      ALLOW_PLAINTEXT_LISTENER: "yes"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    restart: unless-stopped
    networks:
      - app
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ELASTIC_USERNAME=elastic
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 10s
      retries: 10

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.1
    restart: unless-stopped
    networks:
      - app
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      - postgres
      - redis
      - kafka
      - elasticsearch
    networks:
      - app

  celery_worker:
    volumes:
      - ./backend:/app/backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A monolith worker -l info
    env_file: .env
    depends_on:
      - backend
      - redis
    networks:
      - app

  celery_beat:
    volumes:
      - ./backend:/app/backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    working_dir: /app/backend
    command: celery -A monolith beat -l info
    env_file: .env
    depends_on:
      - backend
      - redis
    networks:
      - app

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    env_file: .env
    command: flower --broker=${CELERY_BROKER_URL}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    env_file: .env
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/monitoring-ui:/app/frontend
    depends_on:
      - backend
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
    driver: bridge

