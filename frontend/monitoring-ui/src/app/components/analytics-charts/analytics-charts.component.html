<div class="charts">
  <div class="chart-card" *ngIf="topicData.length">
    <div class="chart-header">
      <div>
        <p class="eyebrow">Тематики обращений</p>
        <h3>Распределение по каналам транспорта</h3>
      </div>
      <div class="pills">
        <span class="pill" *ngFor="let item of topicData | slice: 0: 3">
          {{ item.name }} · {{ item.value }}
        </span>
      </div>
    </div>
    <ngx-charts-bar-vertical
      [scheme]="{ domain: ['#2563EB', '#F97316', '#06B6D4', '#EF4444'] }"
      [results]="topicData"
      [xAxis]="true"
      [yAxis]="true"
      [legend]="false"
      [roundDomains]="true"
    >
    </ngx-charts-bar-vertical>
  </div>

  <div class="chart-card" *ngIf="categoryData.length">
    <h3>Типы обращений</h3>
    <ngx-charts-bar-vertical
      [scheme]="{ domain: ['#3B82F6', '#F97316', '#10B981', '#8B5CF6'] }"
      [results]="categoryData"
      [xAxis]="true"
      [yAxis]="true"
      [legend]="false"
      [roundDomains]="true"
    >
    </ngx-charts-bar-vertical>
  </div>

  <div class="chart-card" *ngIf="sentimentData.length">
    <h3>Тональность</h3>
    <ngx-charts-pie-grid
      [scheme]="{ domain: ['#EF4444', '#94A3B8', '#06B6D4'] }"
      [results]="sentimentData"
      [legend]="false"
      [animations]="true"
    >
    </ngx-charts-pie-grid>
  </div>

  <div class="chart-card" *ngIf="modeData.length">
    <h3>Тип транспорта</h3>
    <ngx-charts-pie-grid
      [scheme]="{ domain: ['#2563EB', '#F97316', '#10B981', '#3B82F6', '#FB923C'] }"
      [results]="modeData"
      [legend]="false"
      [animations]="true"
    >
    </ngx-charts-pie-grid>
  </div>

  <div class="chart-card" *ngIf="statusData.length">
    <h3>Статусы</h3>
    <ngx-charts-pie-chart
      [scheme]="{ domain: ['#F97316', '#FBBF24', '#3B82F6', '#06B6D4', '#94A3B8'] }"
      [results]="statusData"
      [legend]="true"
      [doughnut]="true"
      [labels]="true"
    >
    </ngx-charts-pie-chart>
  </div>

  <div class="chart-card" *ngIf="channelData.length">
    <h3>Каналы поступления</h3>
    <ngx-charts-bar-vertical
      [scheme]="{ domain: ['#8B5CF6', '#F97316', '#2563EB', '#06B6D4'] }"
      [results]="channelData"
      [xAxis]="false"
      [yAxis]="true"
      [legend]="false"
      [roundDomains]="true"
    >
    </ngx-charts-bar-vertical>
  </div>
</div>
