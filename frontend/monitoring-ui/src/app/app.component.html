<ng-container *ngIf="isAuthenticated$ | async; else showLoginPage">
  <div class="app-layout" [class.collapsed]="collapsed">
    <!-- Sidebar -->
    <aside class="sidebar">
      <!-- Logo -->
      <div
        class="sidebar-header"
        tabindex="0"
        (click)="toggleSidebar()"
        (keydown.enter)="toggleSidebar()"
        (keydown.space)="toggleSidebar()">
        <div class="logo-icon">
          <mat-icon>hub</mat-icon>
        </div>
        <span class="logo-text" *ngIf="!collapsed">{{ title }}</span>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">
        <a class="nav-item" routerLink="/" routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: true }"
           [matTooltip]="collapsed ? 'Главная' : ''" matTooltipPosition="right">
          <mat-icon>dashboard</mat-icon>
          <span class="nav-label" *ngIf="!collapsed">Главная</span>
        </a>

        <a class="nav-item" routerLink="/tickets" routerLinkActive="active"
           [matTooltip]="collapsed ? 'Обращения' : ''" matTooltipPosition="right">
          <mat-icon>support_agent</mat-icon>
          <span class="nav-label" *ngIf="!collapsed">Обращения</span>
        </a>

        <a class="nav-item" routerLink="/analytics" routerLinkActive="active"
           [matTooltip]="collapsed ? 'Аналитика' : ''" matTooltipPosition="right">
          <mat-icon>insights</mat-icon>
          <span class="nav-label" *ngIf="!collapsed">Аналитика</span>
        </a>

        <ng-container *ngIf="currentProfile$ | async as profile">
          <a class="nav-item" routerLink="/integrations" routerLinkActive="active"
             *ngIf="canManageIntegrations(profile)"
             [matTooltip]="collapsed ? 'Интеграции' : ''" matTooltipPosition="right">
            <mat-icon>settings_input_component</mat-icon>
            <span class="nav-label" *ngIf="!collapsed">Интеграции</span>
          </a>
        </ng-container>
      </nav>

      <!-- User section at bottom -->
      <div class="sidebar-footer">
        <mat-divider class="nav-divider"></mat-divider>
        <div class="user-info" *ngIf="!collapsed">
          <ng-container *ngIf="currentUser$ | async as user">
            <div class="user-avatar">
              <mat-icon>account_circle</mat-icon>
            </div>
            <div class="user-details">
              <p class="user-name">{{ user.first_name || user.username }}</p>
              <p class="user-role" *ngIf="currentProfile$ | async as profile">
                {{ getRoleName(profile.role) }}
              </p>
            </div>
          </ng-container>
        </div>
        <button class="nav-item logout-btn" (click)="logout()"
                [matTooltip]="collapsed ? 'Выйти' : ''" matTooltipPosition="right">
          <mat-icon>logout</mat-icon>
          <span class="nav-label" *ngIf="!collapsed">Выйти</span>
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>

<ng-template #showLoginPage>
  <main class="login-layout">
    <router-outlet></router-outlet>
  </main>
</ng-template>
